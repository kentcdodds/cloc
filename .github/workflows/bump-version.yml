name: Bump Version
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Bump Version
        id: bump
        continue-on-error: true
        run: |
          npm run bump-version
          npm install --package-lock-only

      - name: Commit changes
        id: commit
        if: steps.bump.outcome == 'success' && steps.bump.conclusion == 'success'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: bump cloc version"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.bump.outcome == 'success' && steps.bump.conclusion == 'success' && steps.commit.outputs.sha != ''
        run: git push origin HEAD:${{ github.ref_name }}

  publish:
    needs: bump
    if: needs.bump.outputs.sha != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish package
        run: npm publish --provenance
